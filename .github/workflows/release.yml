name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-release-artifacts:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            artifact_name: creditlint
            asset_name: creditlint-x86_64-unknown-linux-gnu
          - name: macos-arm64
            os: macos-latest
            artifact_name: creditlint
            asset_name: creditlint-aarch64-apple-darwin
          - name: macos-x64
            os: macos-13
            artifact_name: creditlint
            asset_name: creditlint-x86_64-apple-darwin
          - name: windows-x64
            os: windows-latest
            artifact_name: creditlint.exe
            asset_name: creditlint-x86_64-pc-windows-msvc.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Smoke test release binary
        if: runner.os != 'Windows'
        run: ./scripts/smoke-release-binary.sh ./target/release/creditlint

      - name: Smoke test release binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $repo = Join-Path $env:RUNNER_TEMP "creditlint-smoke-repo"
          New-Item -ItemType Directory -Force -Path $repo | Out-Null
          Set-Location $repo
          git init | Out-Null
          git config user.name "Creditlint Smoke Test"
          git config user.email "creditlint-smoke@example.com"
          & "$env:GITHUB_WORKSPACE\target\release\creditlint.exe" init | Out-Null
          "Reviewed-by: Jane Doe <jane@example.com>" | & "$env:GITHUB_WORKSPACE\target\release\creditlint.exe" check --stdin | Out-Null
          "Co-authored-by: Codex <codex@example.com>" | & "$env:GITHUB_WORKSPACE\target\release\creditlint.exe" check --stdin *> $null
          if ($LASTEXITCODE -ne 1) {
            throw "expected violating input to exit 1"
          }
          & "$env:GITHUB_WORKSPACE\target\release\creditlint.exe" github ruleset-pattern | Out-Null

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.artifact_name }}" "dist/${{ matrix.asset_name }}"

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/release/${{ matrix.artifact_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
