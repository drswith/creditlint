name: release

on:
  workflow_dispatch:
    inputs:
      publish_crate:
        description: "Publish the crate to crates.io after building artifacts"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install pnpm for OpenSpec validation
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo nextest run

      - name: Validate OpenSpec
        run: pnpm dlx @fission-ai/openspec validate --all

  build-release-artifacts:
    name: build-${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            artifact_name: creditlint
            asset_name: creditlint-x86_64-unknown-linux-gnu
            expected_file_pattern: "x86-64"
          - name: macos-arm64
            os: macos-15
            artifact_name: creditlint
            asset_name: creditlint-aarch64-apple-darwin
            expected_file_pattern: "arm64"
          - name: macos-x64
            os: macos-15-intel
            artifact_name: creditlint
            asset_name: creditlint-x86_64-apple-darwin
            expected_file_pattern: "x86_64"
          - name: windows-x64
            os: windows-latest
            artifact_name: creditlint.exe
            asset_name: creditlint-x86_64-pc-windows-msvc.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Verify Unix artifact architecture
        if: runner.os != 'Windows'
        run: |
          file "target/release/${{ matrix.artifact_name }}"
          file "target/release/${{ matrix.artifact_name }}" | grep -E "${{ matrix.expected_file_pattern }}"

      - name: Smoke test release binary
        if: runner.os != 'Windows'
        run: ./scripts/smoke-release-binary.sh ./target/release/creditlint

      - name: Smoke test release binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $repo = Join-Path $env:RUNNER_TEMP "creditlint-smoke-repo"
          New-Item -ItemType Directory -Force -Path $repo | Out-Null
          Set-Location $repo
          git init | Out-Null
          git config user.name "Creditlint Smoke Test"
          git config user.email "creditlint-smoke@example.com"
          & "$env:GITHUB_WORKSPACE\target\release\creditlint.exe" init | Out-Null
          "Reviewed-by: Jane Doe <jane@example.com>" | & "$env:GITHUB_WORKSPACE\target\release\creditlint.exe" check --stdin | Out-Null
          "Co-authored-by: Codex <codex@example.com>" | & "$env:GITHUB_WORKSPACE\target\release\creditlint.exe" check --stdin *> $null
          if ($LASTEXITCODE -ne 1) {
            throw "expected violating input to exit 1"
          }
          & "$env:GITHUB_WORKSPACE\target\release\creditlint.exe" github ruleset-pattern | Out-Null

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.artifact_name }}" "dist/${{ matrix.asset_name }}"

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/release/${{ matrix.artifact_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  checksums:
    name: package-release-assets
    runs-on: ubuntu-latest
    needs: build-release-artifacts
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum creditlint-* > SHA256SUMS
          cat SHA256SUMS

      - name: Upload checksum workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS
          path: dist/SHA256SUMS

      - name: Publish checksum release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/creditlint-*
            dist/SHA256SUMS

  publish-crate:
    name: publish-crate
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-release-artifacts
      - checksums
    permissions:
      contents: read
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_crate)
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify crates.io token is configured
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN is not configured" >&2
            exit 1
          fi

      - name: Dry-run crates.io publish
        run: cargo publish --locked --dry-run

      - name: Publish crate to crates.io
        run: cargo publish --locked
